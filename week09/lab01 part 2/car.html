<!DOCTYPE html>
<html lang="en">
  <head>
 <meta charset="UTF-8" />
 <title>Car Booking</title>
 <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
 <div id="container">
<header>
  <h1>Book a Car</h1>
</header>

<main>
  <section id="form">
 <h2>Contact Us</h2>

 <form action="process.html" method="get" id="booking">

<div class="form-row">
  <label for="contactname">Name</label>
  <input
 type="text"
 name="contactname"
 id="contactname"
 required
 autofocus
 pattern="[A-Z][a-z]+( [A-Z][a-z]+)*"
 title="Please enter a name with the first letter capitalised, e.g. Mary or Mary Jane"
  >
</div>

<div class="form-row">
  <label for="email">Email Address</label>
  <input
 type="email"
 name="email"
 id="email"
 required
 pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$"
 title="Please enter a valid email address"
  >
</div>

<p>Do you have a Driver's Licence</p>

<div class="check">
  <label>
 <input type="radio" name="licence" value="yes" checked>
 Yes
  </label>

  <label>
 <input type="radio" name="licence" value="no">
 No
  </label>
</div>

<div class="form-row">
  <label for="age">Age</label>
  <input
 type="number"
 name="age"
 id="age"
 min="17"
 max="80"
 required
 title="Please enter your age between 17 and 80"
  >
</div>

<div class="form-row">
  <label for="bookingdate">Booking Date</label>
  <input
 type="date"
 name="bookingdate"
 id="bookingdate"
 required
 title="Please select a booking date"
  >
</div>

<div class="form-row">
  <label for="car">Car</label>
  <select name="car" id="car">
 <option value="ford-focus">Ford Focus</option>
 <option value="hyundai-tucson">Hyundai Tucson</option>
 <option value="toyota-rav4">Toyota Rav4</option>
 <option value="renault-kadjar">Renault Kadjar</option>
 <option value="nissan-qashqai">Nissan Qashqai</option>
  </select>
</div>

<p>
  Please provide any other details you think will be useful to us in the text area below
  (it may save us calling or emailing you, and help avoid delays).
</p>

<div class="form-row">
  <label for="details">More details (as much as you think we'll need!)</label>
  <textarea name="details" id="details" rows="6"></textarea>
</div>

<button type="submit">Send Us the Info</button>
<button type="reset">Clear the Info</button>

 </form>
  </section>

  <section id="image">
 <figure>
<img src="images/car.jfif" alt="Car">
<figcaption>Car Rental</figcaption>
 </figure>
  </section>
</main>
 </div>
  </body>
</html>
